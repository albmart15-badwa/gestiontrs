<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Manager | Colectivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        
        body { 
            background-color: #0b0f1a; 
            color: #e2e8f0; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
        }
        
        .glass { 
            background: rgba(23, 30, 49, 0.8); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        
        .nav-btn {
            transition: all 0.3s ease;
            color: #94a3b8;
        }
        
        .nav-active { 
            color: #a78bfa; 
            background: rgba(167, 139, 250, 0.1);
            border-radius: 12px;
        }
        
        .card-glow:hover { 
            border-color: #8b5cf6;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.2);
            transform: translateY(-2px);
        }

        input, select { 
            background: #1a202e !important; 
            color: white !important; 
            border: 1px solid #2d3748 !important; 
            transition: border 0.3s;
        }
        
        input:focus { border-color: #8b5cf6 !important; outline: none; }

        .status-badge {
            font-size: 0.65rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            font-weight: 900;
        }

        .loader-spin {
            animation: spin 1s linear infinite;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-24 md:pb-0">

    <!-- Navegación Superior (Escritorio) -->
    <nav class="hidden md:flex glass sticky top-0 z-50 px-10 py-4 justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-violet-600 rounded-xl flex items-center justify-center shadow-lg shadow-violet-600/40">
                <i class="fas fa-wave-square text-white"></i>
            </div>
            <span class="text-xl font-black tracking-tighter text-white">STUDIO<span class="text-violet-500">HUB</span></span>
        </div>
        <div class="flex gap-2">
            <button onclick="setView('dash')" id="btn-dash" class="nav-btn px-4 py-2 font-bold nav-active">Dashboard</button>
            <button onclick="setView('miembros')" id="btn-miembros" class="nav-btn px-4 py-2 font-bold">Miembros</button>
            <button onclick="setView('limpieza')" id="btn-limpieza" class="nav-btn px-4 py-2 font-bold">Limpieza</button>
            <button onclick="setView('gastos')" id="btn-gastos" class="nav-btn px-4 py-2 font-bold">Gastos</button>
            <button onclick="setView('reservas')" id="btn-reservas" class="nav-btn px-4 py-2 font-bold">Reservas</button>
        </div>
    </nav>

    <!-- Contenedor de Vistas -->
    <main class="max-w-6xl mx-auto p-6 md:p-12">
        
        <!-- DASHBOARD -->
        <section id="view-dash" class="view space-y-10">
            <div class="flex justify-between items-center">
                <h1 class="text-4xl font-black text-white">Hola,<br><span class="text-violet-500">Colectivo</span></h1>
                <button onclick="loadAll()" class="w-12 h-12 glass rounded-full flex items-center justify-center hover:bg-white/10 transition">
                    <i class="fas fa-sync-alt text-slate-400"></i>
                </button>
            </div>

            <!-- Stats Rápidas -->
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="glass p-6 rounded-[2rem] border-b-2 border-violet-500">
                    <p class="text-slate-500 text-[10px] font-black uppercase mb-2">Miembros</p>
                    <div id="stat-m" class="text-3xl font-black text-white">0</div>
                </div>
                <div class="glass p-6 rounded-[2rem] border-b-2 border-emerald-500">
                    <p class="text-slate-500 text-[10px] font-black uppercase mb-2">Caja Mes</p>
                    <div id="stat-p" class="text-3xl font-black text-emerald-400">0€</div>
                </div>
                <div class="glass p-6 rounded-[2rem] border-b-2 border-amber-500">
                    <p class="text-slate-500 text-[10px] font-black uppercase mb-2">Deuda Total</p>
                    <div id="stat-pend" class="text-3xl font-black text-amber-500">0€</div>
                </div>
                <div class="glass p-6 rounded-[2rem] border-b-2 border-sky-500">
                    <p class="text-slate-500 text-[10px] font-black uppercase mb-2">Citas</p>
                    <div id="stat-r" class="text-3xl font-black text-sky-400">0</div>
                </div>
            </div>

            <!-- Alertas Dashboard -->
            <div class="grid md:grid-cols-2 gap-6">
                <div class="glass p-8 rounded-[2.5rem] relative overflow-hidden group">
                    <div class="absolute -right-4 -top-4 text-violet-500/5 text-9xl group-hover:scale-110 transition-transform"><i class="fas fa-broom"></i></div>
                    <h3 class="text-xl font-black mb-6 flex items-center gap-2"><i class="fas fa-magic text-violet-500"></i> Limpieza</h3>
                    <div id="dash-clean" class="bg-black/20 p-5 rounded-2xl border border-white/5">
                        <p class="text-slate-400 italic">Cargando turnos...</p>
                    </div>
                </div>
                <div class="glass p-8 rounded-[2.5rem] relative overflow-hidden group">
                    <div class="absolute -right-4 -top-4 text-sky-500/5 text-9xl group-hover:scale-110 transition-transform"><i class="fas fa-microphone-alt"></i></div>
                    <h3 class="text-xl font-black mb-6 flex items-center gap-2"><i class="fas fa-clock text-sky-500"></i> Próxima Reserva</h3>
                    <div id="dash-res" class="bg-black/20 p-5 rounded-2xl border border-white/5 text-center">
                        <p class="text-slate-400 italic">Sin reservas programadas</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- SECCIÓN MIEMBROS -->
        <section id="view-miembros" class="view hidden space-y-8">
            <div class="flex justify-between items-end">
                <h2 class="text-3xl font-black text-white">Miembros</h2>
                <button onclick="openModal('miembro')" class="bg-violet-600 hover:bg-violet-500 px-6 py-3 rounded-2xl font-black text-sm transition shadow-lg shadow-violet-600/20">
                    NUEVO +
                </button>
            </div>
            <div id="list-miembros" class="grid md:grid-cols-2 gap-4"></div>
        </section>

        <!-- SECCIÓN LIMPIEZA -->
        <section id="view-limpieza" class="view hidden space-y-8">
            <div class="flex justify-between items-end">
                <h2 class="text-3xl font-black text-white">Turnos de Limpieza</h2>
                <button onclick="openModal('limpieza')" class="bg-indigo-600 hover:bg-indigo-500 px-6 py-3 rounded-2xl font-black text-sm transition">
                    ASIGNAR TURNO
                </button>
            </div>
            <div id="list-limpieza" class="grid gap-3"></div>
        </section>

        <!-- SECCIÓN GASTOS -->
        <section id="view-gastos" class="view hidden space-y-8">
            <div class="flex justify-between items-end">
                <h2 class="text-3xl font-black text-white">Gastos Extra</h2>
                <button onclick="openModal('gasto')" class="bg-emerald-600 hover:bg-emerald-500 px-6 py-3 rounded-2xl font-black text-sm transition">
                    NUEVO GASTO
                </button>
            </div>
            <div id="list-gastos" class="grid gap-3"></div>
        </section>

        <!-- SECCIÓN RESERVAS -->
        <section id="view-reservas" class="view hidden space-y-8">
            <div class="flex justify-between items-end">
                <h2 class="text-3xl font-black text-white">Reservas</h2>
                <button onclick="openModal('reserva')" class="bg-sky-600 hover:bg-sky-500 px-6 py-3 rounded-2xl font-black text-sm transition">
                    NUEVA CITA
                </button>
            </div>
            <div id="list-reservas" class="grid gap-3"></div>
        </section>

    </main>

    <!-- Navegación Inferior (Móvil) -->
    <nav class="md:hidden fixed bottom-0 left-0 right-0 glass flex justify-around p-6 border-t border-white/5 z-50 rounded-t-[2.5rem]">
        <button onclick="setView('dash')" class="text-xl text-slate-400 active:text-violet-400"><i class="fas fa-home"></i></button>
        <button onclick="setView('miembros')" class="text-xl text-slate-400 active:text-violet-400"><i class="fas fa-users"></i></button>
        <button onclick="setView('limpieza')" class="text-xl text-slate-400 active:text-violet-400"><i class="fas fa-broom"></i></button>
        <button onclick="setView('gastos')" class="text-xl text-slate-400 active:text-violet-400"><i class="fas fa-wallet"></i></button>
        <button onclick="setView('reservas')" class="text-xl text-slate-400 active:text-violet-400"><i class="fas fa-calendar"></i></button>
    </nav>

    <!-- MODAL -->
    <div id="modal" class="fixed inset-0 bg-black/90 hidden z-[100] items-center justify-center p-6 backdrop-blur-md">
        <div class="glass w-full max-w-lg rounded-[3rem] p-10 relative border border-white/10">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-slate-500 hover:text-white transition">
                <i class="fas fa-times text-xl"></i>
            </button>
            <h3 id="modal-title" class="text-2xl font-black mb-8 text-white">Formulario</h3>
            <form id="form-universal" class="space-y-6">
                <div id="form-body" class="space-y-4"></div>
                <button type="submit" class="w-full bg-violet-600 py-5 rounded-2xl font-black hover:bg-violet-500 transition-all shadow-2xl shadow-violet-600/30 uppercase tracking-widest text-sm text-white">
                    Guardar Cambios
                </button>
            </form>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="fixed bottom-28 md:bottom-10 right-1/2 translate-x-1/2 md:translate-x-0 md:right-10 glass px-6 py-4 rounded-2xl border-violet-500 hidden z-[200] border-l-4">
        <p id="toast-msg" class="text-sm font-bold flex items-center gap-3"></p>
    </div>

    <script>
        // CONFIGURACIÓN API (URL de tu Google Apps Script)
        const API_URL = "https://script.google.com/macros/s/AKfycbzyPBo72tsKRuOER_M0cStav64hyV9Gd4ngUum5k5DVNIM7UITkfsECG3Je5ubQhJvT/exec"; 
        const CUOTA_MENSUAL = 35;

        let db = { miembros: [], gastos: [], reservas: [], limpieza: [] };

        // NAVEGACIÓN ENTRE SECCIONES
        function setView(view) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(`view-${view}`).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            const btn = document.getElementById(`btn-${view}`);
            if(btn) btn.classList.add('nav-active');
        }

        /**
         * Función de petición mejorada para evitar errores de CORS y redirección de Google Scripts.
         */
        async function apiRequest(action, sheet, data = null, retryCount = 0) {
            const url = new URL(API_URL);
            url.searchParams.set('action', action);
            url.searchParams.set('sheet', sheet);
            if (data && action === 'read') {
                 // Si hay filtros en lectura, se añaden como parámetros
                 Object.keys(data).forEach(key => url.searchParams.set(key, data[key]));
            }

            try {
                if (action === 'read') {
                    // Para lectura usamos redirect: 'follow'
                    const response = await fetch(url.toString(), {
                        method: 'GET',
                        redirect: 'follow',
                        headers: {
                            'Accept': 'application/json'
                        }
                    });
                    
                    if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                    return await response.json();
                } else {
                    // Para escritura usamos POST con mode 'no-cors' como fallback seguro 
                    // o intentamos normal si el script tiene CORS habilitado correctamente
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        mode: 'no-cors', // Evita bloqueos pre-flight
                        cache: 'no-cache',
                        headers: {
                            'Content-Type': 'text/plain' // Google Scripts prefiere text/plain para evitar pre-flight
                        },
                        body: JSON.stringify({ action, sheet, data })
                    });
                    
                    // Con no-cors no podemos leer la respuesta, asumimos éxito tras una pausa
                    await new Promise(r => setTimeout(r, 1000));
                    return { success: true };
                }
            } catch (error) {
                console.error(`Error en API (${action} - ${sheet}):`, error);
                
                // Reintentar una vez si falla el fetch inicial (a veces es un glitch de red)
                if (retryCount < 1) {
                    console.log("Reintentando petición...");
                    await new Promise(r => setTimeout(r, 500));
                    return apiRequest(action, sheet, data, retryCount + 1);
                }
                
                showToast("Error de conexión. Reintentando...", true);
                return action === 'read' ? [] : { success: false };
            }
        }

        // CARGA Y RENDERIZADO GENERAL
        async function loadAll() {
            showToast("<i class='fas fa-circle-notch loader-spin'></i> Sincronizando datos...");
            
            try {
                // Ejecutamos las peticiones. Si fallan, apiRequest devolverá un array vacío sin romper la app.
                const results = await Promise.all([
                    apiRequest('read', 'Miembros'),
                    apiRequest('read', 'GastosExtra'),
                    apiRequest('read', 'Reservas'),
                    apiRequest('read', 'Limpieza')
                ]);

                db.miembros = results[0] || [];
                db.gastos = results[1] || [];
                db.reservas = results[2] || [];
                db.limpieza = results[3] || [];
                
                renderAll();
            } catch (e) {
                console.error("Error crítico en carga:", e);
                showToast("Error al procesar datos del servidor.", true);
            }
        }

        function renderAll() {
            // Stats del Dashboard
            const activos = db.miembros.filter(m => m.activo === 'SI');
            const pagados = activos.filter(m => m.pagoCuota === 'SI');
            
            document.getElementById('stat-m').innerText = activos.length;
            document.getElementById('stat-p').innerText = (pagados.length * CUOTA_MENSUAL) + '€';
            document.getElementById('stat-pend').innerText = ((activos.length - pagados.length) * CUOTA_MENSUAL) + '€';
            document.getElementById('stat-r').innerText = db.reservas.length;

            // Info Limpieza en Dashboard
            const tPend = db.limpieza.find(l => l.Realizada === 'NO');
            document.getElementById('dash-clean').innerHTML = tPend ? 
                `<div class="flex justify-between items-center"><p class="font-black text-violet-400">${tPend.Persona1} & ${tPend.Persona2}</p><span class="status-badge text-amber-500">Pendiente</span></div><p class="text-[10px] text-slate-500 mt-2">FECHA TOPE: ${tPend.Fecha}</p>` : 
                `<p class="text-emerald-400 font-bold">¡Estudio impecable!</p>`;

            // Info Reserva en Dashboard
            const prox = db.reservas[0];
            document.getElementById('dash-res').innerHTML = prox ? 
                `<p class="text-lg font-black text-white">${prox.Nombre}</p><p class="text-sky-400 font-bold text-xs uppercase">${prox.Fecha} • ${prox.Hora}</p>` : 
                `<p class="text-slate-500 italic">No hay reservas</p>`;

            renderMiembros();
            renderLimpieza();
            renderGastos();
            renderReservas();
        }

        function renderMiembros() {
            const container = document.getElementById('list-miembros');
            if (!container) return;
            container.innerHTML = db.miembros.length ? db.miembros.map(m => `
                <div class="glass p-6 rounded-[2rem] card-glow cursor-pointer border-l-8 ${m.pagoCuota === 'SI' ? 'border-emerald-500' : 'border-amber-500'}" onclick="openModal('miembro', '${m.id}')">
                    <div class="flex justify-between items-center">
                        <div>
                            <h4 class="font-black text-xl text-white">${m.nombre}</h4>
                            <p class="text-[10px] font-black uppercase text-slate-500 tracking-wider">${m.rol}</p>
                        </div>
                        <div class="px-4 py-2 rounded-xl text-[10px] font-black ${m.pagoCuota === 'SI' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-amber-500/10 text-amber-400'}">
                            ${m.pagoCuota === 'SI' ? 'OK' : 'DEUDA'}
                        </div>
                    </div>
                </div>
            `).join('') : '<p class="text-center text-slate-500 py-10 w-full col-span-2">No se pudieron cargar los miembros o la lista está vacía.</p>';
        }

        function renderLimpieza() {
            const container = document.getElementById('list-limpieza');
            if (!container) return;
            container.innerHTML = db.limpieza.length ? db.limpieza.map(l => `
                <div class="glass p-6 rounded-[2rem] flex justify-between items-center ${l.Realizada === 'SI' ? 'opacity-30' : 'border border-white/10'}">
                    <div class="flex items-center gap-5">
                        <div class="w-12 h-12 rounded-2xl bg-indigo-500/10 flex items-center justify-center text-indigo-400 text-xl"><i class="fas fa-hand-sparkles"></i></div>
                        <div>
                            <p class="font-black text-white">${l.Persona1} & ${l.Persona2}</p>
                            <p class="text-[10px] font-black text-slate-500 uppercase">${l.Fecha}</p>
                        </div>
                    </div>
                    ${l.Realizada === 'NO' ? 
                        `<button onclick="setCleanDone('${l.id}')" class="bg-emerald-600 px-5 py-2 rounded-xl font-black text-[10px] hover:bg-emerald-500 transition uppercase">Hecho</button>` : 
                        `<i class="fas fa-check-double text-emerald-500"></i>`
                    }
                </div>
            `).join('') : '<p class="text-center text-slate-500 py-10">No hay turnos registrados.</p>';
        }

        async function setCleanDone(id) {
            showToast("Actualizando estado...");
            const res = await apiRequest('update', 'Limpieza', { id: id, Realizada: 'SI' });
            if (res.success) {
                loadAll();
            }
        }

        function renderGastos() {
            const container = document.getElementById('list-gastos');
            if (!container) return;
            container.innerHTML = db.gastos.length ? db.gastos.map(g => `
                <div class="glass p-5 rounded-2xl flex justify-between items-center border border-white/5">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center text-emerald-400"><i class="fas fa-coins"></i></div>
                        <p class="font-bold text-sm text-white">${g.Concepto}</p>
                    </div>
                    <p class="text-xl font-black text-emerald-400">${g.Importe}€</p>
                </div>
            `).join('') : '<p class="text-center text-slate-500 py-10">Historial de gastos vacío.</p>';
        }

        function renderReservas() {
            const container = document.getElementById('list-reservas');
            if (!container) return;
            container.innerHTML = db.reservas.length ? db.reservas.map(r => `
                <div class="glass p-5 rounded-2xl flex items-center gap-5 border border-white/5">
                    <div class="bg-sky-500/10 text-sky-400 px-4 py-3 rounded-xl text-center min-w-[80px]">
                        <p class="text-sm font-black">${r.Hora}</p>
                    </div>
                    <div>
                        <h4 class="font-black text-white">${r.Nombre}</h4>
                        <p class="text-[10px] text-slate-500 font-bold uppercase">${r.Fecha} • ${r.Tipo}</p>
                    </div>
                </div>
            `).join('') : '<p class="text-center text-slate-500 py-10">Agenda disponible.</p>';
        }

        // LÓGICA DE MODALES
        function openModal(type, id = null) {
            const body = document.getElementById('form-body');
            const title = document.getElementById('modal-title');
            const item = id ? (db.miembros.find(m => m.id == id) || db.gastos.find(g => g.id == id)) : null;
            
            document.getElementById('modal').style.display = 'flex';
            
            if(type === 'miembro') {
                title.innerText = id ? "Editar Miembro" : "Añadir al Colectivo";
                body.innerHTML = `
                    <input type="hidden" name="sheet" value="Miembros">
                    <input type="hidden" name="action" value="${id ? 'update' : 'create'}">
                    <input type="hidden" name="id" value="${id || Date.now()}">
                    <input type="text" name="nombre" placeholder="Nombre completo" required value="${item?.nombre || ''}" class="w-full p-4 rounded-2xl">
                    <input type="text" name="rol" placeholder="Instrumento o especialidad" value="${item?.rol || ''}" class="w-full p-4 rounded-2xl">
                    <div class="grid grid-cols-2 gap-4">
                        <select name="activo" class="p-4 rounded-2xl"><option value="SI">ACTIVO</option><option value="NO">DE BAJA</option></select>
                        <select name="pagoCuota" class="p-4 rounded-2xl"><option value="NO" ${item?.pagoCuota === 'NO' ? 'selected' : ''}>PENDIENTE</option><option value="SI" ${item?.pagoCuota === 'SI' ? 'selected' : ''}>PAGADO</option></select>
                    </div>
                `;
            } else if(type === 'limpieza') {
                title.innerText = "Nuevo Turno Limpieza";
                const nombres = db.miembros.map(m => `<option value="${m.nombre}">${m.nombre}</option>`).join('') || '<option value="">Cargando miembros...</option>';
                body.innerHTML = `
                    <input type="hidden" name="sheet" value="Limpieza">
                    <input type="hidden" name="action" value="create">
                    <input type="hidden" name="id" value="${Date.now()}">
                    <input type="hidden" name="Realizada" value="NO">
                    <p class="text-[10px] font-black text-slate-500 ml-1 uppercase">Responsable 1</p>
                    <select name="Persona1" class="w-full p-4 rounded-2xl">${nombres}</select>
                    <p class="text-[10px] font-black text-slate-500 ml-1 uppercase">Responsable 2</p>
                    <select name="Persona2" class="w-full p-4 rounded-2xl">${nombres}</select>
                    <p class="text-[10px] font-black text-slate-500 ml-1 uppercase">Fecha tope</p>
                    <input type="date" name="Fecha" required class="w-full p-4 rounded-2xl">
                `;
            } else if(type === 'reserva') {
                title.innerText = "Reservar Sala";
                body.innerHTML = `
                    <input type="hidden" name="sheet" value="Reservas">
                    <input type="hidden" name="action" value="create">
                    <input type="hidden" name="id" value="${Date.now()}">
                    <input type="text" name="Nombre" placeholder="¿Quién reserva?" required class="w-full p-4 rounded-2xl">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="date" name="Fecha" required class="w-full p-4 rounded-2xl">
                        <input type="time" name="Hora" required class="w-full p-4 rounded-2xl">
                    </div>
                    <select name="Tipo" class="w-full p-4 rounded-2xl"><option>Grabación</option><option>Ensayo</option><option>Mezcla</option></select>
                `;
            } else if(type === 'gasto') {
                title.innerText = "Registrar Gasto";
                body.innerHTML = `
                    <input type="hidden" name="sheet" value="GastosExtra">
                    <input type="hidden" name="action" value="create">
                    <input type="hidden" name="id" value="${Date.now()}">
                    <input type="text" name="Concepto" placeholder="Ej. Kit Limpieza o Cables" required class="w-full p-4 rounded-2xl">
                    <input type="number" name="Importe" placeholder="Precio en €" required class="w-full p-4 rounded-2xl">
                    <input type="date" name="Fecha" required class="w-full p-4 rounded-2xl">
                `;
            }
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        // Manejo del envío del formulario universal
        document.getElementById('form-universal').onsubmit = async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const data = Object.fromEntries(fd.entries());
            const sheet = data.sheet;
            const action = data.action;
            delete data.sheet;
            delete data.action;

            closeModal();
            showToast("Guardando cambios en el servidor...");
            const res = await apiRequest(action, sheet, data);
            if (res.success) {
                loadAll();
            }
        };

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            const m = document.getElementById('toast-msg');
            if (t && m) {
                m.innerHTML = msg;
                t.style.borderColor = isError ? '#ef4444' : '#8b5cf6';
                t.classList.remove('hidden');
                setTimeout(() => t.classList.add('hidden'), 4000);
            }
        }

        // Inicio automático
        window.onload = loadAll;
    </script>
</body>
</html>
